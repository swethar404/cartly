name: cartly
description: "Cartly - Smart Retail Intelligence Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5+1

  # Database
  sqflite: ^2.4.2+1
  path: ^1.9.1
  path_provider: ^2.1.5

  # Local Storage
  shared_preferences: ^2.5.5

  # Utilities
  intl: ^0.20.2
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_native_splash: ^2.4.6

flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/

# -----------------------------
# Native Splash Configuration
# -----------------------------

flutter_native_splash:
  color: "#FFFFFF"

  image: assets/icons/splash_logo.png

  android: true
  ios: true
  web: false

  android_12:
    color: "#FFFFFF"
    image: assets/icons/splash_logo.png